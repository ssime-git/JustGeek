<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="{{ site.baseurl }}/">
      <span class="brand-mark">/</span>
      {{ site.title }}
    </a>

    <ul class="navbar-nav">
      {% for item in site.header_pages %}
        {% assign nav_page = site.pages | where: "path", item | first %}
        {% if nav_page %}
        <li>
          <a class="nav-link" href="{{ nav_page.url | relative_url }}">
            {{ nav_page.title | default: nav_page.name | replace: '.md', '' | replace: '-', ' ' | downcase }}
          </a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>

    <button class="theme-toggle" aria-label="Toggle dark mode"><span data-toggle-label>moon · dark</span></button>
  </div>
</nav>
