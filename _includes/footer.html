<footer class="footer">
  {% if site.linkedin_username %}
  <ul class="footer-links">
    <li>
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" aria-label="LinkedIn">in/{{ site.linkedin_username }}</a>
    </li>
  </ul>
  {% endif %}
  <div class="footer-tagline">{{ site.title }} — <span class="t-faint">systèmes qui se comportent bien</span></div>
  <div class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }} · built with Jekyll</div>
</footer>
